                            ? "bg-green-500 hover:bg-green-600 text-white"
                            : "bg-red-600 hover:bg-red-700 text-white shadow-lg hover:shadow-red-500/30"
                        }`}
                      >
                        {added ? "Added to Cart ✓" : "Add to Cart"}
                      </button>
                    </div>
                    <p className="text-sm text-gray-500 flex items-center">
                      <Truck className="h-4 w-4 mr-2" /> Free freight shipping on orders over $5,000.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      function App() {
        const [currentView, setCurrentView] = useState("home");
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [cartCount, setCartCount] = useState(0);

        const navigateToHome = () => {
          setSelectedProduct(null);
          setCurrentView("home");
        };

        const navigateToProduct = (product) => {
          setSelectedProduct(product);
          setCurrentView("product");
        };

        const handleAddToCart = (qty) => {
          setCartCount((prev) => prev + qty);
        };

        return (
          <div className="min-h-screen flex flex-col font-sans text-slate-900 selection:bg-red-500 selection:text-white">
            <Navbar onNavigateHome={navigateToHome} cartCount={cartCount} />

            <main className="flex-grow">
              {currentView === "home" && <HomeView onProductClick={navigateToProduct} />}

              {currentView === "product" && (
                <ProductDetailView product={selectedProduct} onBack={navigateToHome} onAddToCart={handleAddToCart} />
              )}
            </main>

            <Footer />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
